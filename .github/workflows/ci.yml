name: ML CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check src tests
      - run: mypy src --ignore-missing-imports

  test:
    name: Unit Tests (scoring + fairness gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Full deps: test_health imports the whole FastAPI app, and the video tests
      # need librosa. The en_core_web_sm model ships as a wheel in requirements.txt.
      # PIP_CONSTRAINT pins build-time setuptools so openai-whisper's sdist builds
      # (its setup.py needs pkg_resources, removed in setuptools 81+).
      - run: pip install -r requirements.txt
        env:
          PIP_CONSTRAINT: constraints.txt
      - run: pytest tests/ -v --tb=short
